{% extends 'core/base.html' %}
{% load i18n %}

{% block title %}{% trans "Delete Plant" %} | Planteer{% endblock %}

{% block content %}
<section class="plants-page">
    <div class="container">
        <div class="plants-filters-card" style="max-width: 700px; margin: 0 auto; text-align: center;">
            <h2 style="margin-bottom: 16px;">
                {% trans "Delete Plant" %}
            </h2>

            <p style="margin-bottom: 22px;">
                {% trans "Are you sure you want to delete this plant?" %}
                <strong>{{ plant.name }}</strong>
            </p>

            <form method="POST">
                {% csrf_token %}
                <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                    <button type="submit" class="clear-filters-btn">
                        {% trans "Yes, Delete" %}
                    </button>

                    <a href="{% url 'plant_detail' plant.id %}" class="planteer-btn">
                        {% trans "Cancel" %}
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
